  theme_night: minimal
  font: classic
  font_size: L


# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: 'Atul Anurag'
    description: 'Personal academic website of Dr. Atul Anurag, specializing in dynamical systems, vortex dynamics, and nonlinear mathematics.'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
